<div class="main-page max-width">
    <div class="signup-logo">
        <img src="img/icons/logo.svg" />
    </div>
    <div class="signup-container">
        <img class="arrow" src="img/icons/arrowLeft.png" alt="Arrow">
        <div class="arrow-container">

            <h1>Sign up</h1>
        </div>

        <div class="line"></div>
        <form class="signup-content">
            <div id="signup-form">
                <div class="input-container">
                    <input required id="name" type="text" placeholder="Name" class="input-fields-signup">
                    <input required id="email" type="email" placeholder="E-Mail" class="input-fields-signup" />
                    <input required id="password" type="password" min="5" placeholder="Password"
                        class="input-fields-signup" />
                    <input required id="confirmpassword" type="password" min="5" placeholder="Password"
                        class="input-fields-signup" />
                    <div id="error-message-placeholder"><span id="error-message" class="error-message">Please enter
                            you first and last name.</span>
                    </div>
                </div>
                <div class="options">
                    <div class="acceptprivacy-container">
                        <div class="checkbox-wrapper-19"><input type="checkbox" id="cbtest-19" /><label for="cbtest-19"
                                class="check-box"></label></div>
                        <label for="checkbox-privacy">I accept the &nbsp;<a target="_blank"
                                routerLink="/privacy-policy">Privacy Policy</a></label>
                    </div>
                </div>
                <div class="signup-buttons">
                    <button id="signup" class="signup-btn" routerLink="/create-account"><b>Sign up</b></button>
                </div>
            </div>
        </form>
    </div>
    <footer class="footer">
        <a target="_blank" routerLink="/privacy-policy">Privacy Policy</a>
        <a target="_blank" routerLink="/legal-notice">Legal Notice</a>
    </footer>
</div>
